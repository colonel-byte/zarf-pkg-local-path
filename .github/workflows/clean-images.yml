---
name: Daily Image Cleanup
on:
  # every day at 01:30am
  schedule:
    - cron: '30 1 * * *'
  # or manually
  workflow_dispatch:
jobs:
  ghcr-cleanup-image:
    name: ghcr cleanup action
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        type:
          - upstream
          # - registry1
    steps:
      - name: Delete old tags
        uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1.2.0
        with:
          packages: 'zarf/local-path-provider'
          # The hash suffix is "-g" + an unambiguous abbreviation for the tip commit of parent
          # https://git-scm.com/docs/git-describe#_examples
          # TL;DR this will only hit the non-tagged versions
          tags: '*-g*-${{ matrix.type }}'
          keep-n-tagged: 2
          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Validate images
        uses: dataaxiom/ghcr-cleanup-action@374e2028c8fb93b7219f3771cd405fab95d3dec4 # v1.2.0
        with:
          packages: 'zarf/local-path-provider'
          token: ${{ secrets.GITHUB_TOKEN }}
          validate: true
          delete-ghost-images: true
          delete-orphaned-images: true
